name: quickmed
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.15.2
  firebase_auth: ^5.6.0
  cloud_firestore: ^5.6.0
  geolocator: ^10.0.0
  permission_handler: ^12.0.3
  geocoding: ^2.1.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  map_launcher: ^3.4.0
  http: ^1.1.0
  path_provider: ^2.1.0
  flutter_local_notifications: ^13.0.0
  image_picker: ^1.0.1
  google_mlkit_text_recognition: ^0.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

